<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>台灣智庫政策小幫手｜LINE 對話 Demo</title>
<style>
  :root {
    --line-bg: #8cabd8;
    --line-green: #06c755;
    --line-header: #273246;
    --bubble-bot: #ffffff;
    --bubble-user: #85e249;
    --text-dark: #1f2937;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC",
      "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: #e8eaef;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 16px;
  }
  .phone {
    width: 100%; max-width: 420px; height: 92vh; max-height: 820px;
    background: var(--line-bg); border-radius: 24px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 12px 40px rgba(0,0,0,.25);
  }
  @media (max-width: 480px) {
    body { padding: 0; }
    .phone { max-width: none; height: 100vh; max-height: none; border-radius: 0; }
  }

  /* header */
  .header {
    background: var(--line-header); color: #fff;
    padding: 12px 14px; display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .header .back { font-size: 20px; opacity: .85; }
  .header .name { font-size: 16px; font-weight: 600; flex: 1; }
  .header .name small { display: block; font-size: 11px; font-weight: 400; opacity: .65; }
  .header .gear { cursor: pointer; font-size: 18px; opacity: .85; }

  /* chat area */
  .chat { flex: 1; overflow-y: auto; padding: 14px 12px 8px; }
  .day-chip {
    text-align: center; margin: 4px auto 12px;
  }
  .day-chip span {
    background: rgba(0,0,0,.18); color: #fff; font-size: 11px;
    padding: 3px 12px; border-radius: 12px;
  }
  .row { display: flex; margin-bottom: 12px; align-items: flex-end; gap: 6px; }
  .row.bot { justify-content: flex-start; }
  .row.user { justify-content: flex-end; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #0e7490, #1d4ed8);
    color: #fff; font-size: 15px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    align-self: flex-start;
  }
  .bubble-wrap { max-width: 76%; }
  .sender { font-size: 11px; color: rgba(255,255,255,.85); margin: 0 0 3px 4px; }
  .bubble {
    padding: 9px 12px; border-radius: 16px; font-size: 14px;
    line-height: 1.55; color: var(--text-dark);
    white-space: pre-wrap; word-break: break-word;
  }
  .bot .bubble { background: var(--bubble-bot); border-top-left-radius: 4px; }
  .user .bubble { background: var(--bubble-user); border-top-right-radius: 4px; }
  .bubble a { color: #1d4ed8; text-decoration: none; word-break: break-all; }
  .bubble a:hover { text-decoration: underline; }
  .bubble .refs {
    margin-top: 8px; padding-top: 8px; border-top: 1px solid #e5e7eb;
    font-size: 12.5px;
  }
  .bubble .refs .ref-item { margin-bottom: 6px; }
  .meta {
    font-size: 10px; color: rgba(255,255,255,.8);
    align-self: flex-end; flex-shrink: 0; line-height: 1.3; text-align: right;
  }
  .user .meta { order: -1; }

  /* typing indicator */
  .typing { display: inline-flex; gap: 4px; padding: 4px 2px; }
  .typing i {
    width: 7px; height: 7px; background: #9ca3af; border-radius: 50%;
    animation: blink 1.2s infinite;
  }
  .typing i:nth-child(2) { animation-delay: .2s; }
  .typing i:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: .25 } 40% { opacity: 1 } }

  /* quick replies */
  .quick {
    display: flex; gap: 8px; padding: 6px 12px; overflow-x: auto;
    flex-shrink: 0; -webkit-overflow-scrolling: touch;
  }
  .quick::-webkit-scrollbar { display: none; }
  .quick button {
    white-space: nowrap; border: 1px solid rgba(255,255,255,.7);
    background: rgba(255,255,255,.18); color: #fff; font-size: 12.5px;
    padding: 6px 13px; border-radius: 16px; cursor: pointer;
  }
  .quick button:active { background: rgba(255,255,255,.4); }

  /* input bar */
  .input-bar {
    background: #fff; padding: 8px 10px; display: flex; gap: 8px;
    align-items: center; flex-shrink: 0;
  }
  .input-bar input {
    flex: 1; border: none; outline: none; font-size: 15px;
    background: #f3f4f6; border-radius: 18px; padding: 9px 14px;
  }
  .input-bar .send {
    background: var(--line-green); color: #fff; border: none;
    width: 38px; height: 38px; border-radius: 50%; font-size: 16px;
    cursor: pointer; flex-shrink: 0;
  }
  .input-bar .send:disabled { background: #cbd5e1; }

  /* settings drawer */
  .drawer {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  .drawer.open { display: flex; }
  .drawer .panel {
    background: #fff; border-radius: 16px; padding: 22px; width: 90%;
    max-width: 360px;
  }
  .panel h3 { font-size: 16px; margin-bottom: 6px; }
  .panel p { font-size: 12px; color: #6b7280; margin-bottom: 12px; line-height: 1.5; }
  .panel input {
    width: 100%; padding: 10px 12px; border: 1px solid #d1d5db;
    border-radius: 8px; font-size: 13px; margin-bottom: 12px;
  }
  .panel .btns { display: flex; gap: 8px; }
  .panel button {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    font-size: 14px; cursor: pointer;
  }
  .panel .save { background: var(--line-green); color: #fff; }
  .panel .cancel { background: #e5e7eb; }
  .badge {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 10px; margin-left: 6px; vertical-align: middle;
  }
  .badge.live { background: #dcfce7; color: #15803d; }
  .badge.demo { background: #fef3c7; color: #b45309; }
</style>
</head>
<body>

<div class="phone">
  <div class="header">
    <span class="back">‹</span>
    <div class="name">
      台灣智庫政策小幫手
      <small id="mode-label">連線模式確認中…</small>
    </div>
    <span class="gear" id="gear" title="設定 API Key">⚙︎</span>
  </div>

  <div class="chat" id="chat">
    <div class="day-chip"><span id="today"></span></div>
  </div>

  <div class="quick" id="quick"></div>

  <div class="input-bar">
    <input id="input" type="text" placeholder="輸入政策問題…" autocomplete="off">
    <button class="send" id="send">➤</button>
  </div>
</div>

<div class="drawer" id="drawer">
  <div class="panel">
    <h3>Claude API 設定</h3>
    <p>輸入 Anthropic API Key 後，機器人會即時呼叫 Claude API（模型：claude-opus-4-8）並根據台灣智庫網站文章回答。<br><br>
    ⚠️ Key 僅存在你的瀏覽器 localStorage，正式上線請改用後端代理，勿將 Key 曝露於前端。<br>
    未設定 Key 時會以「離線示範模式」回覆。</p>
    <input id="key-input" type="password" placeholder="sk-ant-...">
    <div class="btns">
      <button class="cancel" id="key-cancel">取消</button>
      <button class="save" id="key-save">儲存</button>
    </div>
  </div>
</div>

<script>
/* ============ 設定 ============ */
const MODEL = "claude-opus-4-8";
const MAX_CONTEXT_ARTICLES = 30;
const SYSTEM_PROMPT = `你是「台灣智庫政策小幫手」，一個 LINE 上的政策 AI 助理。你只能根據台灣智庫（Taiwan Thinktank，https://www.taiwanthinktank.org）網站的文章回答。

嚴格規則：
1. 只能引用使用者訊息中〈文章資料〉區塊提供的文章內容回答，禁止使用其他知識來源補充或杜撰。
2. 回覆結構：先提出政策建議或分析（條列 2~4 點，每點 1~2 句，開頭用「💡」），語氣專業親切、適合 LINE 短訊（總長 350 字以內）。
3. 建議之後空一行，以「📎 參考文章」開頭，列出你實際引用的 1~4 篇文章，每篇一行，格式：「・標題\\n  網址」。網址必須逐字複製〈文章資料〉中的 url，禁止自行編造網址。
4. 若〈文章資料〉中沒有足夠相關的內容，誠實說明「台灣智庫網站目前沒有直接相關的研究」，再列出 1~2 篇最接近的文章供延伸閱讀；不可硬掰。
5. 與公共政策無關的問題（閒聊、天氣等），簡短友善回應並引導使用者詢問政策議題，此時不需列參考文章。
6. 一律使用繁體中文（台灣用語）。`;

const QUICK_QUESTIONS = [
  "台灣半導體產業的戰略地位？",
  "如何強化台灣的民主韌性？",
  "面對中國軍事威脅該如何因應？",
  "金融科技政策有什麼建議？",
  "台灣如何成為中型強國？",
];

/* ============ 狀態 ============ */
let ARTICLES = [];
let apiKey = localStorage.getItem("ttt_api_key") || "";
let PROXY = false; // 若後端 /api/chat 代理存在則為 true（Key 在伺服器，訪客免貼）
const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");

/* ============ 初始化 ============ */
document.getElementById("today").textContent =
  new Date().toLocaleDateString("zh-TW", { month: "long", day: "numeric", weekday: "short" });

fetch("data/articles.json")
  .then(r => r.json())
  .then(d => { ARTICLES = d; updateModeLabel(); })
  .catch(() => addBot("⚠️ 無法載入文章資料庫（data/articles.json）。請確認檔案存在。"));

QUICK_QUESTIONS.forEach(q => {
  const b = document.createElement("button");
  b.textContent = q;
  b.onclick = () => { inputEl.value = q; handleSend(); };
  document.getElementById("quick").appendChild(b);
});

addBot("你好！我是台灣智庫政策小幫手 🤖\n\n我會根據台灣智庫網站上的 265 篇政策研究與評論文章，回答你的國家政策問題，並附上原文連結。\n\n請直接輸入問題，或點選下方的常見問題試試！");

function updateModeLabel() {
  const el = document.getElementById("mode-label");
  if (PROXY) el.innerHTML = `Claude API 已連線（伺服器代理 · ${MODEL}）`;
  else if (apiKey) el.innerHTML = `Claude API 已連線（${MODEL}）`;
  else el.innerHTML = "離線示範模式（未設定 API Key）";
}
updateModeLabel();

// 探測後端代理是否存在（部署到 Vercel 等平台時會有 /api/chat）
fetch("api/chat")
  .then(r => r.ok ? r.json() : null)
  .then(j => { if (j && j.ok) { PROXY = true; updateModeLabel(); } })
  .catch(() => {});

/* ============ 設定面板 ============ */
const drawer = document.getElementById("drawer");
document.getElementById("gear").onclick = () => {
  document.getElementById("key-input").value = apiKey;
  drawer.classList.add("open");
};
document.getElementById("key-cancel").onclick = () => drawer.classList.remove("open");
document.getElementById("key-save").onclick = () => {
  apiKey = document.getElementById("key-input").value.trim();
  if (apiKey) localStorage.setItem("ttt_api_key", apiKey);
  else localStorage.removeItem("ttt_api_key");
  drawer.classList.remove("open");
  updateModeLabel();
  addBot(apiKey ? "✅ API Key 已儲存，之後的回覆將由 Claude 即時生成。" : "已切換為離線示範模式。");
};

/* ============ 聊天 UI ============ */
function timeNow() {
  return new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit", hour12: false });
}
function scrollBottom() { chatEl.scrollTop = chatEl.scrollHeight; }

function addUser(text) {
  const row = document.createElement("div");
  row.className = "row user";
  row.innerHTML = `<div class="meta">已讀<br>${timeNow()}</div>
    <div class="bubble-wrap"><div class="bubble"></div></div>`;
  row.querySelector(".bubble").textContent = text;
  chatEl.appendChild(row);
  scrollBottom();
}

function addBot(text, isHTML = false) {
  const row = document.createElement("div");
  row.className = "row bot";
  row.innerHTML = `<div class="avatar">智</div>
    <div class="bubble-wrap">
      <div class="sender">台灣智庫政策小幫手</div>
      <div class="bubble"></div>
    </div>
    <div class="meta">${timeNow()}</div>`;
  const bubble = row.querySelector(".bubble");
  if (isHTML) bubble.innerHTML = text; else bubble.textContent = text;
  chatEl.appendChild(row);
  scrollBottom();
  return row;
}

function addTyping() {
  const row = document.createElement("div");
  row.className = "row bot";
  row.innerHTML = `<div class="avatar">智</div>
    <div class="bubble-wrap"><div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div></div>`;
  chatEl.appendChild(row);
  scrollBottom();
  return row;
}

/* 把回覆中的網址轉成可點連結 */
function renderReply(text) {
  const esc = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  return esc.replace(/(https?:\/\/[^\s、，）)]+)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

/* ============ 檢索（輕量 RAG）============ */
function retrieve(query) {
  const grams = new Set();
  const han = query.match(/[一-鿿]/g) || [];
  for (let i = 0; i < han.length - 1; i++) grams.add(han[i] + han[i + 1]);
  (query.toLowerCase().match(/[a-z0-9]{2,}/g) || []).forEach(w => grams.add(w));

  const scored = ARTICLES.map(a => {
    const title = a.title.toLowerCase();
    const body = (a.title + " " + a.summary).toLowerCase();
    let s = 0;
    grams.forEach(g => {
      if (title.includes(g)) s += 3;
      else if (body.includes(g)) s += 1;
    });
    return { a, s };
  }).sort((x, y) => y.s - x.s);

  const hits = scored.filter(x => x.s > 0).slice(0, MAX_CONTEXT_ARTICLES).map(x => x.a);
  // 沒命中時退回最新 20 篇，讓模型自行判斷並誠實告知
  return hits.length ? hits : ARTICLES.slice(0, 20);
}

function buildContext(arts) {
  return arts.map((a, i) =>
    `[${i + 1}] 標題：${a.title}\n分類：${a.category}｜日期：${a.date || "未標示"}\nurl：${a.url}\n摘要：${a.summary}`
  ).join("\n\n");
}

/* ============ Claude API ============ */
async function askClaude(question) {
  const context = buildContext(retrieve(question));
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 1500,
      system: SYSTEM_PROMPT,
      messages: [{
        role: "user",
        content: `〈文章資料〉\n${context}\n\n〈使用者問題〉\n${question}`,
      }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const msg = err?.error?.message || `HTTP ${res.status}`;
    if (res.status === 401) throw new Error("API Key 無效，請點右上角 ⚙︎ 重新設定。");
    if (res.status === 429) throw new Error("請求太頻繁，請稍後再試。（" + msg + "）");
    throw new Error("API 錯誤：" + msg);
  }
  const data = await res.json();
  if (data.stop_reason === "refusal") throw new Error("這個問題我無法回答，請換個政策議題試試。");
  return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
}

/* ============ 伺服器代理模式 ============ */
async function askProxy(question) {
  const context = buildContext(retrieve(question));
  const res = await fetch("api/chat", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ question, context }),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `伺服器錯誤 HTTP ${res.status}`);
  return data.reply || "";
}

/* ============ 離線示範模式 ============ */
function demoReply(question) {
  const hits = retrieve(question).slice(0, 3);
  const bullets = hits.map(a => `💡 ${a.summary.slice(0, 60)}…`).join("\n");
  const refs = hits.map(a => `・${a.title}\n  ${a.url}`).join("\n");
  return `（離線示範模式：以下為根據關鍵字檢索的模擬回覆，設定 API Key 後將由 Claude 即時生成）\n\n${bullets}\n\n📎 參考文章\n${refs}`;
}

/* ============ 送出 ============ */
async function handleSend() {
  const q = inputEl.value.trim();
  if (!q || sendBtn.disabled) return;
  inputEl.value = "";
  addUser(q);
  sendBtn.disabled = true;
  const typing = addTyping();
  try {
    const reply = PROXY ? await askProxy(q)
      : apiKey ? await askClaude(q)
      : demoReply(q);
    typing.remove();
    addBot(renderReply(reply), true);
  } catch (e) {
    typing.remove();
    addBot("😥 " + e.message);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
sendBtn.onclick = handleSend;
inputEl.addEventListener("keydown", e => { if (e.key === "Enter") handleSend(); });
</script>
</body>
</html>
