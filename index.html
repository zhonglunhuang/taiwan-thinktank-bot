<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>台灣智庫政策小幫手｜LINE 對話 Demo</title>
<style>
  :root {
    --navy: #0b2545;
    --teal: #17879e;
    --line-green: #06c755;
    --user-a: #8ae05a;
    --user-b: #74d746;
    --bubble-bot: #ffffff;
    --text-dark: #1f2937;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC",
      "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(160deg, #dfe6f0, #c9d4e4);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 16px;
  }
  .phone {
    width: 100%; max-width: 430px; height: 92vh; max-height: 860px;
    background: linear-gradient(180deg, #cdddee 0%, #b9cee6 100%);
    border-radius: 26px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(11,37,69,.28);
    position: relative;
  }
  @media (max-width: 480px) {
    body { padding: 0; }
    .phone { max-width: none; height: 100vh; max-height: none; border-radius: 0; }
  }

  /* ===== header ===== */
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--teal) 100%);
    color: #fff; padding: 13px 15px; display: flex; align-items: center; gap: 11px;
    flex-shrink: 0; box-shadow: 0 2px 8px rgba(11,37,69,.25); z-index: 5;
  }
  .header .back { font-size: 22px; opacity: .8; margin-right: -3px; }
  .header .h-avatar {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #ffd76a, #f59e0b);
    color: var(--navy); font-size: 18px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 2px rgba(255,255,255,.35);
  }
  .header .name { font-size: 16px; font-weight: 700; flex: 1; line-height: 1.25; }
  .header .name small {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 400; opacity: .8; margin-top: 2px;
  }
  .header .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .header .gear { cursor: pointer; font-size: 19px; opacity: .85; }

  /* ===== chat ===== */
  .chat { flex: 1; overflow-y: auto; padding: 16px 12px 10px; }
  .chat::-webkit-scrollbar { width: 0; }
  .day-chip { text-align: center; margin: 2px auto 14px; }
  .day-chip span {
    background: rgba(11,37,69,.20); color: #fff; font-size: 11px;
    padding: 4px 13px; border-radius: 12px; backdrop-filter: blur(2px);
  }

  .row { display: flex; margin-bottom: 13px; align-items: flex-end; gap: 7px; }
  .row.bot { justify-content: flex-start; }
  .row.user { justify-content: flex-end; }
  .row.enter { animation: pop .28s ease; }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--teal), var(--navy));
    color: #fff; font-size: 16px; font-weight: 700; font-family: "Songti TC", serif;
    display: flex; align-items: center; justify-content: center; align-self: flex-start;
    box-shadow: 0 2px 5px rgba(11,37,69,.25);
  }
  .bubble-wrap { max-width: 78%; }
  .sender { font-size: 11px; color: rgba(11,37,69,.62); margin: 0 0 3px 5px; font-weight: 600; }
  .bubble {
    padding: 10px 13px; border-radius: 18px; font-size: 14.5px;
    line-height: 1.6; color: var(--text-dark);
    white-space: pre-wrap; word-break: break-word;
    box-shadow: 0 1px 3px rgba(11,37,69,.14);
  }
  .bot .bubble { background: var(--bubble-bot); border-top-left-radius: 5px; }
  .user .bubble {
    background: linear-gradient(135deg, var(--user-a), var(--user-b));
    color: #08340f; border-top-right-radius: 5px; font-weight: 500;
  }
  .bubble a { color: var(--teal); text-decoration: none; word-break: break-all; font-weight: 600; }
  .bubble a:active { text-decoration: underline; }
  .bubble .refs {
    margin-top: 10px; padding: 9px 11px; background: #f4f8fb;
    border: 1px solid #e2ecf3; border-radius: 12px; font-size: 12.5px; line-height: 1.55;
  }
  .bubble .refs-title { font-weight: 700; color: var(--navy); margin-bottom: 5px; }
  .caret {
    display: inline-block; width: 2px; height: 15px; background: var(--teal);
    margin-left: 1px; vertical-align: -2px; animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .meta { font-size: 10px; color: rgba(11,37,69,.6); align-self: flex-end; flex-shrink: 0; line-height: 1.3; text-align: right; }
  .user .meta { order: -1; }

  /* typing dots */
  .typing { display: inline-flex; gap: 4px; padding: 3px 2px; }
  .typing i { width: 7px; height: 7px; background: #b0bccb; border-radius: 50%; animation: bd 1.2s infinite; }
  .typing i:nth-child(2) { animation-delay: .2s; }
  .typing i:nth-child(3) { animation-delay: .4s; }
  @keyframes bd { 0%,80%,100% { opacity: .3; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-3px); } }

  /* ===== cards ===== */
  .cards { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .card {
    display: flex; align-items: center; gap: 11px; cursor: pointer;
    background: #fff; border: 1px solid #e6eef4; border-radius: 14px; padding: 11px 12px;
    box-shadow: 0 1px 3px rgba(11,37,69,.10); transition: transform .12s, box-shadow .12s;
  }
  .card:active { transform: scale(.97); box-shadow: 0 1px 2px rgba(11,37,69,.08); }
  .card .c-ico {
    width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0; font-size: 19px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #e8f3f6, #dbeaf0);
  }
  .card .c-body { flex: 1; min-width: 0; }
  .card .c-title { font-size: 14px; font-weight: 700; color: var(--navy); }
  .card .c-sub { font-size: 11.5px; color: #6b7a8d; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .c-arrow { color: #b6c3d1; font-size: 20px; flex-shrink: 0; }

  /* ===== quick bar ===== */
  .quick { display: flex; gap: 8px; padding: 4px 12px 8px; overflow-x: auto; flex-shrink: 0; }
  .quick::-webkit-scrollbar { display: none; }
  .quick button {
    white-space: nowrap; border: 1px solid rgba(255,255,255,.85);
    background: rgba(255,255,255,.28); color: var(--navy); font-size: 12.5px; font-weight: 600;
    padding: 6px 13px; border-radius: 16px; cursor: pointer; backdrop-filter: blur(3px);
  }
  .quick button:active { background: rgba(255,255,255,.55); }

  /* ===== input ===== */
  .input-bar { background: #fff; padding: 9px 10px; display: flex; gap: 8px; align-items: center; flex-shrink: 0; box-shadow: 0 -1px 6px rgba(11,37,69,.08); }
  .input-bar input { flex: 1; border: none; outline: none; font-size: 15px; background: #eef2f6; border-radius: 20px; padding: 10px 15px; }
  .input-bar .send {
    background: linear-gradient(135deg, #22c55e, var(--line-green)); color: #fff; border: none;
    width: 40px; height: 40px; border-radius: 50%; font-size: 17px; cursor: pointer; flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(6,199,85,.4);
  }
  .input-bar .send:disabled { background: #cbd5e1; box-shadow: none; }

  /* ===== drawer ===== */
  .drawer { position: fixed; inset: 0; background: rgba(11,37,69,.5); display: none; align-items: center; justify-content: center; z-index: 50; }
  .drawer.open { display: flex; }
  .drawer .panel { background: #fff; border-radius: 18px; padding: 22px; width: 90%; max-width: 360px; }
  .panel h3 { font-size: 16px; margin-bottom: 6px; color: var(--navy); }
  .panel p { font-size: 12px; color: #6b7280; margin-bottom: 12px; line-height: 1.55; }
  .panel input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
  .panel .btns { display: flex; gap: 8px; }
  .panel button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
  .panel .save { background: var(--line-green); color: #fff; }
  .panel .cancel { background: #e5e7eb; }
</style>
</head>
<body>

<div class="phone">
  <div class="header">
    <span class="back">‹</span>
    <div class="h-avatar">智</div>
    <div class="name">
      台灣智庫政策小幫手
      <small><span class="dot"></span><span id="mode-label">連線確認中…</span></small>
    </div>
    <span class="gear" id="gear" title="設定 API Key">⚙︎</span>
  </div>

  <div class="chat" id="chat">
    <div class="day-chip"><span id="today"></span></div>
  </div>

  <div class="quick" id="quick"></div>

  <div class="input-bar">
    <input id="input" type="text" placeholder="輸入政策問題…" autocomplete="off">
    <button class="send" id="send">➤</button>
  </div>
</div>

<div class="drawer" id="drawer">
  <div class="panel">
    <h3>Claude API 設定</h3>
    <p>此為前端直連模式：輸入 Anthropic API Key 後，機器人會即時呼叫 Claude API（模型 claude-opus-4-8）。<br><br>
    ⚠️ Key 僅存於你的瀏覽器 localStorage。若網站已部署後端代理，則不需在此輸入（Key 已在伺服器）。未設定時以「離線示範模式」回覆。</p>
    <input id="key-input" type="password" placeholder="sk-ant-...">
    <div class="btns">
      <button class="cancel" id="key-cancel">取消</button>
      <button class="save" id="key-save">儲存</button>
    </div>
  </div>
</div>

<script>
/* ============ 設定 ============ */
const MODEL = "claude-opus-4-8";
const ANTHROPIC_URL = "https://api.anthropic.com/v1/messages";
const MAX_CONTEXT_ARTICLES = 30;

const SYSTEM_PROMPT = `你是「台灣智庫政策小幫手」，一位 LINE 上的政策 AI 助理，代表台灣智庫（Taiwan Thinktank，https://www.taiwanthinktank.org）。你只能根據使用者訊息〈文章資料〉中提供的台灣智庫文章內容回答，禁止使用其他知識來源或杜撰。

【回覆風格】
1. 開場先給一句「強而有力、前瞻堅定」的重點結論，語氣參考台灣智庫共同創辦人林佳龍的風格：宏觀、務實、以「韌性」「臺灣的價值與機會」「面對挑戰、掌握契機」為主軸，展現信心與行動力（可用「臺灣的關鍵在於…」「面對○○的挑戰，我們更要主動出擊…」這類開場）。但只是借用其語氣，不得假冒林佳龍本人發言。
2. 開場結論後，條列 2~4 點具體政策建議，每點 1~2 句、開頭用「💡」。
3. 所有內容必須有〈文章資料〉支撐，不可延伸杜撰。語氣專業而堅定、適合 LINE 短訊，總長約 350 字內，使用繁體中文（臺灣用語）。

【參考文章】
建議之後空一行，以「📎 參考文章」開頭，列出你實際引用的 1~4 篇文章，每篇兩行：第一行「・標題」，第二行縮排貼上〈文章資料〉中的 url（逐字複製，禁止自行編造或改寫網址）。

【例外】
・若〈文章資料〉沒有足夠相關內容，誠實說明「台灣智庫網站目前沒有直接相關的研究」，再列出 1~2 篇最接近的文章供延伸閱讀，不可硬掰。
・與公共政策無關的閒聊，簡短友善回應並引導對方詢問政策議題，此時不需列參考文章。`;

const DIRECTIONS = [
  { icon: "🌐", title: "兩岸與國際", sub: "外交、中國情勢、國際結盟", q: "請分析台灣在兩岸關係與國際外交上的策略方向與具體政策建議。" },
  { icon: "🛡️", title: "國防與安全", sub: "軍事威脅、國安、社會韌性", q: "面對中國的軍事威脅，台灣在國防與國家安全上應該怎麼做？" },
  { icon: "💠", title: "經濟與產業", sub: "半導體、金融、供應鏈", q: "台灣的半導體與經濟產業有哪些戰略機會與政策建議？" },
  { icon: "🗳️", title: "民主與法治", sub: "民主韌性、法律、政治改革", q: "台灣要如何深化民主韌性、強化法治？" },
  { icon: "🎓", title: "文化與教育", sub: "文化、教育、觀光", q: "台灣在文化、教育與觀光發展上有什麼政策方向？" },
  { icon: "📊", title: "民意與趨勢", sub: "民調、社會脈動", q: "台灣智庫的民調反映出哪些重要的社會趨勢與民意？" },
];

const HOT = ["台灣半導體的戰略地位？", "如何強化民主韌性？", "台灣如何成為中型強國？"];

/* ============ 狀態 ============ */
let ARTICLES = [];
let apiKey = localStorage.getItem("ttt_api_key") || "";
let PROXY = false;
let busy = false;
const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send");

/* ============ 初始化 ============ */
document.getElementById("today").textContent =
  new Date().toLocaleDateString("zh-TW", { month: "long", day: "numeric", weekday: "short" });

HOT.forEach(q => {
  const b = document.createElement("button");
  b.textContent = q;
  b.onclick = () => sendText(q);
  document.getElementById("quick").appendChild(b);
});

fetch("data/articles.json")
  .then(r => r.json())
  .then(d => { ARTICLES = d; boot(); })
  .catch(() => addBot("⚠️ 無法載入文章資料庫（data/articles.json）。"));

function boot() {
  addBot("你好！我是台灣智庫政策小幫手 🤖\n\n我會根據台灣智庫網站上的 " + ARTICLES.length +
    " 篇政策研究與評論，回答你的國家政策問題，並附上原文連結。");
  addCards("先選一個你最關心的政策方向，我幫你切入重點 👇", DIRECTIONS.map(d => ({
    icon: d.icon, title: d.title, sub: d.sub, onTap: () => sendText(d.q),
  })));
}

fetch("api/chat")
  .then(r => r.ok ? r.json() : null)
  .then(j => { if (j && j.ok) { PROXY = true; updateModeLabel(); } })
  .catch(() => {});

function updateModeLabel() {
  const el = document.getElementById("mode-label");
  if (PROXY) el.textContent = "已連線・伺服器代理";
  else if (apiKey) el.textContent = "已連線・即時問答";
  else el.textContent = "離線示範模式";
}
updateModeLabel();

/* ============ 設定面板 ============ */
const drawer = document.getElementById("drawer");
document.getElementById("gear").onclick = () => { document.getElementById("key-input").value = apiKey; drawer.classList.add("open"); };
document.getElementById("key-cancel").onclick = () => drawer.classList.remove("open");
document.getElementById("key-save").onclick = () => {
  apiKey = document.getElementById("key-input").value.trim();
  if (apiKey) localStorage.setItem("ttt_api_key", apiKey); else localStorage.removeItem("ttt_api_key");
  drawer.classList.remove("open"); updateModeLabel();
  addBot(apiKey ? "✅ API Key 已儲存，之後將由 Claude 即時生成回覆。" : "已切換為離線示範模式。");
};

/* ============ UI 基礎 ============ */
function timeNow() { return new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit", hour12: false }); }
function scrollBottom() { chatEl.scrollTop = chatEl.scrollHeight; }
function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function linkify(html) { return html.replace(/(https?:\/\/[^\s、，）)]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>'); }

function renderReply(text) {
  const parts = text.split(/\n?\s*📎 ?參考文章\s*/);
  let html = linkify(esc(parts[0].trim()));
  if (parts.length > 1) {
    const refs = linkify(esc(parts.slice(1).join("📎 參考文章").trim()));
    html += `<div class="refs"><div class="refs-title">📎 參考文章</div>${refs}</div>`;
  }
  return html;
}

function addUser(text) {
  const row = document.createElement("div");
  row.className = "row user enter";
  row.innerHTML = `<div class="meta">已讀<br>${timeNow()}</div><div class="bubble-wrap"><div class="bubble"></div></div>`;
  row.querySelector(".bubble").textContent = text;
  chatEl.appendChild(row); scrollBottom();
}

function addBot(text) {
  const row = document.createElement("div");
  row.className = "row bot enter";
  row.innerHTML = `<div class="avatar">智</div><div class="bubble-wrap"><div class="sender">台灣智庫政策小幫手</div><div class="bubble"></div></div><div class="meta">${timeNow()}</div>`;
  row.querySelector(".bubble").textContent = text;
  chatEl.appendChild(row); scrollBottom();
}

function addCards(intro, items) {
  const row = document.createElement("div");
  row.className = "row bot enter";
  row.innerHTML = `<div class="avatar">智</div><div class="bubble-wrap"><div class="sender">台灣智庫政策小幫手</div><div class="bubble"></div><div class="cards"></div></div>`;
  row.querySelector(".bubble").textContent = intro;
  const box = row.querySelector(".cards");
  items.forEach(it => {
    const c = document.createElement("div");
    c.className = "card";
    c.innerHTML = `<div class="c-ico">${it.icon}</div><div class="c-body"><div class="c-title"></div><div class="c-sub"></div></div><div class="c-arrow">›</div>`;
    c.querySelector(".c-title").textContent = it.title;
    c.querySelector(".c-sub").textContent = it.sub;
    c.onclick = it.onTap;
    box.appendChild(c);
  });
  chatEl.appendChild(row); scrollBottom();
}

/* 串流泡泡：逐字揭露 */
function addStreamingBot() {
  const row = document.createElement("div");
  row.className = "row bot enter";
  row.innerHTML = `<div class="avatar">智</div><div class="bubble-wrap"><div class="sender">台灣智庫政策小幫手</div><div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div></div><div class="meta">${timeNow()}</div>`;
  chatEl.appendChild(row); scrollBottom();
  const bubble = row.querySelector(".bubble");
  let queue = [], raw = "", started = false, done = false, onDone = null;
  let last = performance.now(), acc = 0;
  // 時間基準揭字：揭示字數正比於實際經過時間，前景順暢、背景（計時器被節流）也只跳格不卡死
  const timer = setInterval(() => {
    const now = performance.now(), dt = now - last; last = now;
    const cps = queue.length > 240 ? 240 : queue.length > 100 ? 130 : 55; // 佇列越長揭越快
    acc += (dt / 1000) * cps;
    let n = Math.floor(acc);
    if (n > 0 && queue.length) {
      acc -= n;
      if (!started) { started = true; bubble.innerHTML = ""; }
      while (n-- > 0 && queue.length) raw += queue.shift();
      bubble.innerHTML = esc(raw) + '<span class="caret"></span>';
      scrollBottom();
    } else if (queue.length === 0 && done) {
      clearInterval(timer);
      bubble.innerHTML = raw ? renderReply(raw) : "（無回覆）";
      scrollBottom();
      if (onDone) onDone();
    }
  }, 16);
  return {
    push: t => { if (t) for (const ch of t) queue.push(ch); },
    finish: cb => { onDone = cb; done = true; },
  };
}

/* ============ 檢索（輕量 RAG）============ */
function retrieve(query) {
  const grams = new Set();
  const han = query.match(/[一-鿿]/g) || [];
  for (let i = 0; i < han.length - 1; i++) grams.add(han[i] + han[i + 1]);
  (query.toLowerCase().match(/[a-z0-9]{2,}/g) || []).forEach(w => grams.add(w));
  const scored = ARTICLES.map(a => {
    const title = a.title.toLowerCase(), body = (a.title + " " + a.summary).toLowerCase();
    let s = 0;
    grams.forEach(g => { if (title.includes(g)) s += 3; else if (body.includes(g)) s += 1; });
    return { a, s };
  }).sort((x, y) => y.s - x.s);
  const hits = scored.filter(x => x.s > 0).slice(0, MAX_CONTEXT_ARTICLES).map(x => x.a);
  return hits.length ? hits : ARTICLES.slice(0, 20);
}
function buildContext(arts) {
  return arts.map((a, i) => `[${i + 1}] 標題：${a.title}\n分類：${a.category}｜日期：${a.date || "未標示"}\nurl：${a.url}\n摘要：${a.summary}`).join("\n\n");
}

/* ============ 串流呼叫 ============ */
async function claudeStream(q, push) {
  const context = buildContext(retrieve(q));
  const res = await fetch(ANTHROPIC_URL, {
    method: "POST",
    headers: {
      "content-type": "application/json", "x-api-key": apiKey,
      "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: MODEL, max_tokens: 1500, stream: true, system: SYSTEM_PROMPT,
      messages: [{ role: "user", content: `〈文章資料〉\n${context}\n\n〈使用者問題〉\n${q}` }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 401) throw new Error("API Key 無效，請點右上角 ⚙︎ 重新設定。");
    if (res.status === 429) throw new Error("請求太頻繁，請稍後再試。");
    throw new Error("API 錯誤：" + (err?.error?.message || res.status));
  }
  await readSSE(res, push);
}
async function proxyStream(q, push) {
  const context = buildContext(retrieve(q));
  const res = await fetch("api/chat", {
    method: "POST", headers: { "content-type": "application/json" },
    body: JSON.stringify({ question: q, context }),
  });
  if (!res.ok) { const j = await res.json().catch(() => ({})); throw new Error(j.error || `伺服器錯誤 HTTP ${res.status}`); }
  const reader = res.body.getReader(), dec = new TextDecoder();
  while (true) { const { done, value } = await reader.read(); if (done) break; push(dec.decode(value, { stream: true })); }
}
async function readSSE(res, push) {
  const reader = res.body.getReader(), dec = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read(); if (done) break;
    buf += dec.decode(value, { stream: true });
    let idx;
    while ((idx = buf.indexOf("\n")) >= 0) {
      const line = buf.slice(0, idx); buf = buf.slice(idx + 1);
      if (line.startsWith("data:")) {
        const p = line.slice(5).trim(); if (!p) continue;
        try { const o = JSON.parse(p); if (o.type === "content_block_delta" && o.delta?.type === "text_delta") push(o.delta.text); } catch (_) {}
      }
    }
  }
}
async function demoStream(q, push) {
  const hits = retrieve(q).slice(0, 3);
  const bullets = hits.map(a => `💡 ${a.summary.slice(0, 55)}…`).join("\n");
  const refs = hits.map(a => `・${a.title}\n  ${a.url}`).join("\n");
  push(`臺灣的關鍵，在於把握每一次結構轉變的契機。（離線示範模式，設定 API Key 後由 Claude 即時生成）\n\n${bullets}\n\n📎 參考文章\n${refs}`);
}

/* ============ 延伸探索卡片 ============ */
function showFollowups(q) {
  const hits = retrieve(q).slice(0, 3);
  if (!hits.length) return;
  addCards("想更深入嗎？點下面的方向，我幫你延伸 👇", hits.map(a => ({
    icon: "📄", title: a.title.length > 22 ? a.title.slice(0, 22) + "…" : a.title,
    sub: "點我深入了解這篇研究",
    onTap: () => sendText(`請根據台灣智庫的研究，深入說明：「${a.title}」的重點與政策意涵。`),
  })));
}

/* ============ 送出 ============ */
async function sendText(q) {
  q = (q || "").trim();
  if (!q || busy) return;
  busy = true; sendBtn.disabled = true;
  inputEl.value = "";
  addUser(q);
  const bot = addStreamingBot();
  let ok = true;
  try {
    const streamer = PROXY ? proxyStream : apiKey ? claudeStream : demoStream;
    await streamer(q, bot.push);
  } catch (e) {
    ok = false;
    bot.push("😥 " + e.message);
  }
  await new Promise(res => bot.finish(res));
  busy = false; sendBtn.disabled = false; inputEl.focus();
  if (ok) showFollowups(q);
}
function handleSend() { sendText(inputEl.value); }

sendBtn.onclick = handleSend;
inputEl.addEventListener("keydown", e => {
  // 避免中文注音等 IME 組字時誤送並殘留文字
  if (e.key === "Enter" && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); handleSend(); }
});
